{% extends "base.html" %}

{% block title %}Job Listing{% endblock %}

{% block content %}
    <h1>{{ section.title }}</h1>

    {% for job in job_list %}
    <h2>
    <a href="{{ job.get_absolute_url }}">
        {{ job.headline|upper }}
    </a>
    </h2>
    <p>{{ story.tease|truncatewords:"100" }}</p>
    {% endfor %} 
{% endblock %}
